apiVersion: apps/v1
kind: Deployment
metadata:
  name: investments-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: investments-service
  template:
    metadata:
      labels:
        app: investments-service
    spec:
      initContainers:
      - name: wait-for-db
        image: busybox
        command: ['sh', '-c', 'until nc -z investments-db 5432; do echo waiting for db; sleep 2; done']
      containers:
      - name: investments-service
        image: investments-service:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 8003
        env:
        - name: DATABASE_URL
          valueFrom:
            configMapKeyRef:
              name: investments-config
              key: DATABASE_URL
        - name: JWT_SECRET_KEY
          valueFrom:
            configMapKeyRef:
              name: investments-config
              key: JWT_SECRET_KEY
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: investments-db
spec:
  replicas: 1
  selector:
    matchLabels:
      app: investments-db
  template:
    metadata:
      labels:
        app: investments-db
    spec:
      containers:
      - name: investments-db
        image: postgres:15
        env:
        - name: POSTGRES_DB
          value: investments_db
        - name: POSTGRES_USER
          value: investments_user
        - name: POSTGRES_PASSWORD
          value: investments_pass