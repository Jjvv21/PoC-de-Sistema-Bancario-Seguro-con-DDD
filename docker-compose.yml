services:
  iam-db:
    image: postgres:16
    container_name: iam-db
    environment:
      POSTGRES_USER: iam_user
      POSTGRES_PASSWORD: iam_pass
      POSTGRES_DB: iam_db
    ports:
      - "5443:5432"
    volumes:
      - iam_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U iam_user -d iam_db"]
      interval: 3s
      timeout: 3s
      retries: 10
  iam-service:
    build: ./iam-service
    container_name: iam-service
    environment:
      DATABASE_URL: postgresql://iam_user:iam_pass@iam-db:5432/iam_db
      JWT_SECRET_KEY: dev-secret-change-in-production
    ports:
      - "8011:8001"
    depends_on:
      iam-db:
        condition: service_healthy
  banking-db:
    image: postgres:16
    container_name: banking-db
    environment:
      POSTGRES_USER: banking_user
      POSTGRES_PASSWORD: banking_pass
      POSTGRES_DB: banking_db
    ports:
      - "5444:5432"
    volumes:
      - banking_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U banking_user -d banking_db"]
      interval: 3s
      timeout: 3s
      retries: 10
  banking-service:
    build: ./banking-service
    container_name: banking-service
    environment:
      DATABASE_URL: postgresql://banking_user:banking_pass@banking-db:5432/banking_db
      JWT_SECRET_KEY: dev-secret-change-in-production
    ports:
      - "8012:8002"
    depends_on:
      banking-db:
        condition: service_healthy
  investments-db:
    image: postgres:15
    container_name: investments-db
    environment:
      POSTGRES_DB: investments_db
      POSTGRES_USER: investments_user
      POSTGRES_PASSWORD: investments_pass
    volumes:
      - investments_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U investments_user -d investments_db"]
      interval: 3s
      timeout: 3s
      retries: 10
  investments-service:
    build: ./investments-service
    container_name: investments-service
    ports:
      - "8013:8003"
    environment:
      DATABASE_URL: postgresql://investments_user:investments_pass@investments-db:5432/investments_db
      JWT_SECRET_KEY: dev-secret-change-in-production
    depends_on:
      investments-db:
        condition: service_healthy
volumes:
  iam_data:
  banking_data:
  investments_db_data:
